# docker-compose.yml

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer-with-volume
    restart: always
    ports:
      - "8000:8000"     # Optional Edge tunnel port
      - "9444:9443"     # HTTPS UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/portainer_data:/data

volumes:
  portainer_data:
    driver: local
    